<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Ironlands — Map View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 390px;
    height: 844px;
    background: #0a0c10;
    color: #e8e0d4;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px 8px;
    font-size: 12px;
    font-weight: 600;
    color: #999;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
  }
  .status-bar .time { font-size: 15px; color: #ccc; }

  /* Map canvas fills screen */
  .map-canvas {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
  }

  .map-canvas svg {
    width: 100%;
    height: 100%;
  }

  /* Map overlay header */
  .map-header {
    position: absolute;
    top: 44px;
    left: 16px;
    right: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 50;
  }

  .map-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: #c1a778;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .map-controls {
    display: flex;
    gap: 8px;
  }
  .map-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(10, 12, 16, 0.85);
    border: 1px solid rgba(193, 167, 120, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    backdrop-filter: blur(10px);
  }

  /* Hex info panel (bottom sheet peek) */
  .hex-info {
    position: absolute;
    bottom: 80px;
    left: 12px;
    right: 12px;
    background: rgba(15, 18, 24, 0.95);
    border: 1px solid rgba(193, 167, 120, 0.15);
    border-radius: 16px;
    padding: 16px 18px;
    backdrop-filter: blur(20px);
    z-index: 50;
  }
  .hex-info-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .hex-info-title {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    color: #f0e6d6;
  }
  .hex-info-subtitle {
    font-size: 12px;
    color: #7a7468;
    margin-top: 2px;
  }
  .hex-coord {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #c1a778;
    background: rgba(193, 167, 120, 0.1);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .hex-details {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }
  .hex-detail {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #b8b0a2;
  }
  .hex-detail-icon {
    font-size: 14px;
  }

  .hex-actions {
    display: flex;
    gap: 8px;
  }
  .hex-action-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(193, 167, 120, 0.2);
    background: rgba(193, 167, 120, 0.08);
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: #c1a778;
  }
  .hex-action-btn.primary {
    background: rgba(193, 167, 120, 0.2);
    border-color: rgba(193, 167, 120, 0.4);
    color: #f0e6d6;
  }

  /* Legend */
  .map-legend {
    position: absolute;
    top: 90px;
    right: 12px;
    background: rgba(10, 12, 16, 0.85);
    border: 1px solid rgba(193, 167, 120, 0.12);
    border-radius: 10px;
    padding: 10px 12px;
    z-index: 50;
    backdrop-filter: blur(10px);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: #9a917f;
    margin-bottom: 5px;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  /* Unit markers on map */
  .unit-marker {
    position: absolute;
    z-index: 30;
  }

  /* Bottom nav */
  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 390px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0 28px;
    background: linear-gradient(to top, rgba(10, 12, 16, 0.95) 60%, transparent);
    border-top: 1px solid rgba(193, 167, 120, 0.1);
    z-index: 60;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: #5a5448;
    text-decoration: none;
  }
  .nav-item.active { color: #c1a778; }
  .nav-icon { font-size: 20px; }
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">7:44</span>
  <div style="display:flex;gap:6px;align-items:center">
    <span style="font-size:11px">📶</span>
    <span style="font-size:11px">🔋</span>
  </div>
</div>

<!-- Map SVG -->
<div class="map-canvas">
<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <radialGradient id="explored" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#161c24"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </radialGradient>
    <radialGradient id="fog" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(10,12,16,0.3)"/>
      <stop offset="100%" stop-color="rgba(10,12,16,0.95)"/>
    </radialGradient>
    <!-- Hex pattern -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#explored)"/>

  <!-- Hex grid - explored area (brighter) -->
  <!-- Row 1 -->
  <polygon points="120,180 150,163 180,180 180,214 150,231 120,214" fill="#1a2820" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="180,180 210,163 240,180 240,214 210,231 180,214" fill="#1c2a22" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="240,180 270,163 300,180 300,214 270,231 240,214" fill="#1e2c24" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>

  <!-- Row 2 -->
  <polygon points="90,214 120,197 150,214 150,248 120,265 90,248" fill="#1a2820" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="150,214 180,197 210,214 210,248 180,265 150,248" fill="#1d2b23" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="210,214 240,197 270,214 270,248 240,265 210,248" fill="#1a2820" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="270,214 300,197 330,214 330,248 300,265 270,248" fill="#2a261c" stroke="#3a3628" stroke-width="0.5" opacity="0.9"/>

  <!-- Row 3 -->
  <polygon points="60,248 90,231 120,248 120,282 90,299 60,282" fill="#1a2820" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="120,248 150,231 180,248 180,282 150,299 120,282" fill="#1c2c22" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="180,248 210,231 240,248 240,282 210,299 180,282" fill="#22321a" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="240,248 270,231 300,248 300,282 270,299 240,282" fill="#2c2a1a" stroke="#3a3628" stroke-width="0.5" opacity="0.8"/>
  <polygon points="300,248 330,231 360,248 360,282 330,299 300,282" fill="#30281a" stroke="#3a3628" stroke-width="0.5" opacity="0.7"/>

  <!-- Row 4 (main village row) -->
  <polygon points="30,282 60,265 90,282 90,316 60,333 30,316" fill="#182618" stroke="#2a3a30" stroke-width="0.5" opacity="0.8"/>
  <polygon points="90,282 120,265 150,282 150,316 120,333 90,316" fill="#1c2c22" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="150,282 180,265 210,282 210,316 180,333 150,316" fill="#1e2e24" stroke="#2a3a30" stroke-width="0.5" opacity="1"/>
  <!-- Home hex - highlighted -->
  <polygon points="210,282 240,265 270,282 270,316 240,333 210,316" fill="#243020" stroke="#c1a778" stroke-width="1.5" opacity="1" filter="url(#glow)"/>
  <polygon points="270,282 300,265 330,282 330,316 300,333 270,316" fill="#2a281c" stroke="#3a3628" stroke-width="0.5" opacity="0.8"/>
  <polygon points="330,282 360,265 390,282 390,316 360,333 330,316" fill="#2e261a" stroke="#3a3628" stroke-width="0.5" opacity="0.6"/>

  <!-- Row 5 -->
  <polygon points="60,316 90,299 120,316 120,350 90,367 60,350" fill="#1a2820" stroke="#2a3a30" stroke-width="0.5" opacity="0.8"/>
  <polygon points="120,316 150,299 180,316 180,350 150,367 120,350" fill="#1c2c22" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="180,316 210,299 240,316 240,350 210,367 180,350" fill="#1e2e24" stroke="#2a3a30" stroke-width="0.5" opacity="0.9"/>
  <polygon points="240,316 270,299 300,316 300,350 270,367 240,350" fill="#2a281c" stroke="#3a3628" stroke-width="0.5" opacity="0.8"/>
  <polygon points="300,316 330,299 360,316 360,350 330,367 300,350" fill="#2c261a" stroke="#3a3628" stroke-width="0.5" opacity="0.6"/>

  <!-- Row 6 -->
  <polygon points="90,350 120,333 150,350 150,384 120,401 90,384" fill="#182618" stroke="#2a3a30" stroke-width="0.5" opacity="0.7"/>
  <polygon points="150,350 180,333 210,350 210,384 180,401 150,384" fill="#1a2a20" stroke="#2a3a30" stroke-width="0.5" opacity="0.8"/>
  <!-- Selected hex -->
  <polygon points="210,350 240,333 270,350 270,384 240,401 210,384" fill="#2a3420" stroke="#64b4ff" stroke-width="2" opacity="1"/>
  <polygon points="270,350 300,333 330,350 330,384 300,401 270,384" fill="#28261c" stroke="#3a3628" stroke-width="0.5" opacity="0.7"/>

  <!-- Row 7 -->
  <polygon points="120,384 150,367 180,384 180,418 150,435 120,418" fill="#182618" stroke="#2a3a30" stroke-width="0.5" opacity="0.6"/>
  <polygon points="180,384 210,367 240,384 240,418 210,435 180,418" fill="#1a2820" stroke="#2a3a30" stroke-width="0.5" opacity="0.7"/>
  <polygon points="240,384 270,367 300,384 300,418 270,435 240,418" fill="#26241a" stroke="#3a3628" stroke-width="0.5" opacity="0.6"/>

  <!-- Row 8 -->
  <polygon points="150,418 180,401 210,418 210,452 180,469 150,452" fill="#161e16" stroke="#2a3a30" stroke-width="0.5" opacity="0.5"/>
  <polygon points="210,418 240,401 270,418 270,452 240,469 210,452" fill="#1a2618" stroke="#2a3a30" stroke-width="0.5" opacity="0.5"/>

  <!-- Fog of war hexes (dimmer, partially visible) -->
  <polygon points="0,248 30,231 60,248 60,282 30,299 0,282" fill="#0e1210" stroke="#1a2418" stroke-width="0.5" opacity="0.3"/>
  <polygon points="0,316 30,299 60,316 60,350 30,367 0,350" fill="#0e1210" stroke="#1a2418" stroke-width="0.5" opacity="0.2"/>

  <!-- Mountain hexes (top right) -->
  <polygon points="300,180 330,163 360,180 360,214 330,231 300,214" fill="#2a2620" stroke="#3a3228" stroke-width="0.5" opacity="0.7"/>
  <polygon points="330,214 360,197 390,214 390,248 360,265 330,248" fill="#2c2822" stroke="#3a3228" stroke-width="0.5" opacity="0.5"/>

  <!-- Fog overlay on edges -->
  <rect x="0" y="0" width="390" height="160" fill="url(#fog)" opacity="0.8"/>
  <rect x="0" y="500" width="390" height="344" fill="url(#fog)" opacity="0.9"/>

  <!-- Village icon at home hex -->
  <text x="240" y="295" text-anchor="middle" font-size="18" fill="#c1a778" filter="url(#glow)">🏘️</text>
  <text x="240" y="310" text-anchor="middle" font-family="Cinzel" font-size="7" fill="#c1a778" letter-spacing="1">ASHENMOOR</text>

  <!-- Unit icons -->
  <text x="240" y="365" text-anchor="middle" font-size="14">⚔️</text>
  <text x="240" y="378" text-anchor="middle" font-family="Inter" font-size="7" fill="#64b4ff">Iron Wolves</text>

  <!-- Scout icon -->
  <text x="300" y="228" text-anchor="middle" font-size="12">🔭</text>
  <text x="300" y="240" text-anchor="middle" font-family="Inter" font-size="6" fill="#b464dc">Scout</text>

  <!-- NPC city marker -->
  <text x="120" y="296" text-anchor="middle" font-size="14">🏛️</text>
  <text x="120" y="310" text-anchor="middle" font-family="Inter" font-size="7" fill="#c8a03c">Saltmere</text>

  <!-- Enemy indicator -->
  <text x="270" y="196" text-anchor="middle" font-size="12">⚠️</text>
  <text x="270" y="208" text-anchor="middle" font-family="Inter" font-size="6" fill="#dc503c">Drenn</text>

  <!-- Discovery marker -->
  <text x="300" y="196" text-anchor="middle" font-size="10">✨</text>

  <!-- Dotted movement path -->
  <line x1="240" y1="316" x2="240" y2="340" stroke="#64b4ff" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>

  <!-- Compass -->
  <g transform="translate(40, 500)">
    <circle cx="0" cy="0" r="18" fill="rgba(10,12,16,0.8)" stroke="rgba(193,167,120,0.2)" stroke-width="1"/>
    <text x="0" y="-6" text-anchor="middle" font-family="Cinzel" font-size="8" fill="#c1a778">N</text>
    <text x="0" y="12" text-anchor="middle" font-family="Cinzel" font-size="6" fill="#5a5448">S</text>
    <text x="-10" y="3" text-anchor="middle" font-family="Cinzel" font-size="6" fill="#5a5448">W</text>
    <text x="10" y="3" text-anchor="middle" font-family="Cinzel" font-size="6" fill="#5a5448">E</text>
  </g>

</svg>
</div>

<!-- Map header overlay -->
<div class="map-header">
  <div class="map-title">TERRITORY MAP</div>
  <div class="map-controls">
    <div class="map-btn">🔍</div>
    <div class="map-btn">📍</div>
  </div>
</div>

<!-- Legend -->
<div class="map-legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#1e2e24;border:1px solid #2a3a30"></div>
    Forest
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#2a281c;border:1px solid #3a3628"></div>
    Hills
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#2c2822;border:1px solid #3a3228"></div>
    Mountains
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#0e1210;border:1px solid #1a2418"></div>
    Fog of War
  </div>
</div>

<!-- Hex info panel -->
<div class="hex-info">
  <div class="hex-info-header">
    <div>
      <div class="hex-info-title">Forested Hill</div>
      <div class="hex-info-subtitle">Iron Wolves warband · 12 warriors</div>
    </div>
    <div class="hex-coord">3142</div>
  </div>
  <div class="hex-details">
    <div class="hex-detail">
      <span class="hex-detail-icon">🌲</span>
      <span>Dense forest</span>
    </div>
    <div class="hex-detail">
      <span class="hex-detail-icon">🐗</span>
      <span>Wild boar</span>
    </div>
    <div class="hex-detail">
      <span class="hex-detail-icon">🛡️</span>
      <span>+2 defence</span>
    </div>
  </div>
  <div class="hex-actions">
    <div class="hex-action-btn">Scout</div>
    <div class="hex-action-btn">Hunt</div>
    <div class="hex-action-btn primary">Move Orders</div>
  </div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <a class="nav-item" href="#">
    <span class="nav-icon">📜</span>
    <span>Report</span>
  </a>
  <a class="nav-item active" href="#">
    <span class="nav-icon">🗺️</span>
    <span>Map</span>
  </a>
  <a class="nav-item" href="#">
    <span class="nav-icon">⚙️</span>
    <span>Orders</span>
  </a>
  <a class="nav-item" href="#">
    <span class="nav-icon">🏰</span>
    <span>Clan</span>
  </a>
  <a class="nav-item" href="#">
    <span class="nav-icon">💬</span>
    <span>Messages</span>
  </a>
</div>

</body>
</html>
